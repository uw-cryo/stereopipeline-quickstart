version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  jobs:
    pre_build:
      # Mirror the notebook tree into the docs build (Jupyter Book renders them in place).
      - mkdir -p docs/tutorials
      - cp notebooks/*.ipynb docs/tutorials/

sphinx:
  configuration: docs/conf.py

python:
  install:
    - requirements: docs/requirements.txt
