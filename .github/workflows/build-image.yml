name: Build & push container image

# Builds the stereopipeline-quickstart image (ASP binaries + asp_plot conda env
# + dev tools) and pushes it to GHCR so Codespaces can pull it instead of
# building from source on first launch.
#
# Image lives at ghcr.io/bpurinton/stereopipeline-quickstart — a different
# namespace from the source repo (uw-cryo/stereopipeline-quickstart). The
# default GITHUB_TOKEN can only push to packages owned by this repo's owner,
# so we use a PAT instead:
#
#   1. On bpurinton's GitHub account, create a classic PAT at
#      https://github.com/settings/tokens with at least `write:packages`
#      scope (and `read:packages` for buildcache pulls).
#   2. Add it to this repo as an Actions secret named `GHCR_PAT`
#      (Settings → Secrets and variables → Actions → New repository secret).
#   3. The `Log in to GHCR` step below uses `username: bpurinton` and
#      `password: ${{ secrets.GHCR_PAT }}`.
#
# Tags pushed: `latest`, the short git SHA, and `asp-${ASP_VERSION}` so users
# can pin to a specific ASP release if needed.

on:
  push:
    branches: [main]
    paths:
      - '.devcontainer/Dockerfile'
      - '.devcontainer/environment.yml'
      - '.github/workflows/build-image.yml'
  workflow_dispatch:
    inputs:
      asp_version:
        description: 'ASP version (e.g. 3.6.0)'
        required: false
        default: '3.6.0'
      asp_build_date:
        description: 'ASP release build date (YYYY-MM-DD as it appears in the tarball filename)'
        required: false
        default: '2025-12-26'
  schedule:
    # Monthly rebuild so security updates from the base image flow through
    # even when our Dockerfile/environment.yml are unchanged.
    - cron: '0 6 1 * *'

env:
  REGISTRY: ghcr.io
  # Image hosted under bpurinton's GHCR namespace (separate from the source
  # repo's owner). Push auth uses the GHCR_PAT secret — see header comment
  # for setup. Change this if you ever move hosting.
  IMAGE_NAME: bpurinton/stereopipeline-quickstart

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: bpurinton
          password: ${{ secrets.GHCR_PAT }}

      - name: Resolve ASP build args
        id: asp
        run: |
          echo "version=${{ github.event.inputs.asp_version || '3.6.0' }}" >> "$GITHUB_OUTPUT"
          echo "date=${{ github.event.inputs.asp_build_date || '2025-12-26' }}" >> "$GITHUB_OUTPUT"

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=raw,value=asp-${{ steps.asp.outputs.version }}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .devcontainer/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ASP_VERSION=${{ steps.asp.outputs.version }}
            ASP_BUILD_DATE=${{ steps.asp.outputs.date }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Summary
        run: |
          echo "### Image pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Tags:" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Pull with: \`docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\`" >> "$GITHUB_STEP_SUMMARY"
